<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRISK - متجر الملابس</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    height:300px;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.hero h1{
    font-size:48px;
}

.products{
    padding:40px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.price{
    color:#27ae60;
    font-size:20px;
    margin:10px 0;
}

button{
    background:#111;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <h2>BRISK</h2>
    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">المنتجات</a>
        <a href="#">من نحن</a>
        <a href="#">اتصل بنا</a>
    </nav>
</header>

<section class="hero">
    <h1>أحدث صيحات الملابس</h1>
    <p>اكتشف تشكيلتنا الجديدة</p>
</section>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/400x500" alt="">
        <div class="card-content">
            <h3>تيشيرت أسود</h3>
            <p class="price">3500 DA</p>
            <button>أضف للسلة</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400x500" alt="">
        <div class="card-content">
            <h3>هودي عصري</h3>
            <p class="price">6500 DA</p>
            <button>أضف للسلة</button>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400x500" alt="">
        <div class="card-content">
            <h3>بنطال كاجوال</h3>
            <p class="price">5500 DA</p>
            <button>أضف للسلة</button>
        </div>
    </div>

</section>

<footer>
    © 2026 BRISK - جميع الحقوق محفوظة
</footer>

</body>
</html>
